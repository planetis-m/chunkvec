name: CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:

env:
  SQLITE_VECTOR_VERSION: 0.9.92

jobs:
  linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Nim
        uses: jiro4989/setup-nim-action@v2
        with:
          nim-version: stable
          repo-token: ${{ github.token }}

      - name: Install Atlas via Nimble
        run: nimble install -y "https://github.com/nim-lang/atlas@#head"

      - name: Install Nim dependencies
        run: atlas install

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libcurl4-openssl-dev libsqlite3-dev

      - name: Download SQLite Vector
        run: |
          mkdir -p third_party/sqlite
          curl -L \
            "https://github.com/sqliteai/sqlite-vector/releases/download/v${{ env.SQLITE_VECTOR_VERSION }}/vector-linux-x86_64-${{ env.SQLITE_VECTOR_VERSION }}.tar.gz" \
            -o vector-linux-x86_64.tar.gz
          tar -xf vector-linux-x86_64.tar.gz -C third_party/sqlite
          candidate="$(find third_party/sqlite -type f -name 'vector.so' | head -n 1)"
          test -n "$candidate"
          if [ "$candidate" != "third_party/sqlite/vector.so" ]; then
            mv "$candidate" third_party/sqlite/vector.so
          fi

      - name: Build apps
        run: |
          nim c -d:release -o:chunkvec_ingest src/chunkvec_ingest.nim
          nim c -d:release -o:chunkvec_search src/chunkvec_search.nim

      - name: Run tests
        run: nim e tests/ci.nims

  macos:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Nim
        uses: jiro4989/setup-nim-action@v2
        with:
          nim-version: stable
          repo-token: ${{ github.token }}

      - name: Install Atlas via Nimble
        run: nimble install -y "https://github.com/nim-lang/atlas@#head"

      - name: Install Nim dependencies
        run: atlas install

      - name: Install dependencies
        run: brew install curl

      - name: Download SQLite Vector
        run: |
          mkdir -p third_party/sqlite
          curl -L \
            "https://github.com/sqliteai/sqlite-vector/releases/download/v${{ env.SQLITE_VECTOR_VERSION }}/vector-macos-${{ env.SQLITE_VECTOR_VERSION }}.tar.gz" \
            -o vector-macos.tar.gz
          tar -xf vector-macos.tar.gz -C third_party/sqlite
          candidate="$(find third_party/sqlite -type f -name 'vector.dylib' | head -n 1)"
          test -n "$candidate"
          if [ "$candidate" != "third_party/sqlite/vector.dylib" ]; then
            mv "$candidate" third_party/sqlite/vector.dylib
          fi

      - name: Build apps
        run: |
          nim c -d:release -o:chunkvec_ingest src/chunkvec_ingest.nim
          nim c -d:release -o:chunkvec_search src/chunkvec_search.nim

      - name: Run tests
        run: nim e tests/ci.nims

  windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Nim
        uses: jiro4989/setup-nim-action@v2
        with:
          nim-version: stable
          repo-token: ${{ github.token }}

      - name: Install Atlas via Nimble
        run: nimble install -y "https://github.com/nim-lang/atlas@#head"

      - name: Install Nim dependencies
        run: atlas install

      - name: Install dependencies
        uses: johnwason/vcpkg-action@v7
        id: vcpkg
        with:
          pkgs: curl[http2,ssl,c-ares] sqlite3
          triplet: x64-windows-release
          token: ${{ github.token }}

      - name: Download SQLite Vector
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path third_party/sqlite | Out-Null
          curl.exe -L `
            "https://github.com/sqliteai/sqlite-vector/releases/download/v${{ env.SQLITE_VECTOR_VERSION }}/vector-windows-x86_64-${{ env.SQLITE_VECTOR_VERSION }}.zip" `
            -o vector-windows-x86_64.zip
          Expand-Archive -Path vector-windows-x86_64.zip -DestinationPath third_party/sqlite -Force
          $candidate = Get-ChildItem -Path third_party/sqlite -Recurse -Filter vector.dll |
            Select-Object -First 1
          if ($null -eq $candidate) {
            throw "vector.dll not found in archive"
          }
          $expected = Join-Path $pwd "third_party/sqlite/vector.dll"
          if ($candidate.FullName -ne $expected) {
            Move-Item $candidate.FullName $expected -Force
          }

      - name: Build apps
        shell: pwsh
        env:
          VCPKG_ROOT: ${{ github.workspace }}\vcpkg\installed\x64-windows-release
        run: |
          nim c -d:release -o:chunkvec_ingest.exe src/chunkvec_ingest.nim
          nim c -d:release -o:chunkvec_search.exe src/chunkvec_search.nim

      - name: Run tests
        shell: pwsh
        env:
          VCPKG_ROOT: ${{ github.workspace }}\vcpkg\installed\x64-windows-release
        run: |
          $env:PATH = "$env:VCPKG_ROOT\\bin;" + $env:PATH
          nim e tests/ci.nims
