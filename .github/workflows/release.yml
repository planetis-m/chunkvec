name: Release Build

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

env:
  VERSION: ${{ github.ref_name }}
  SQLITE_VECTOR_VERSION: 0.9.92

jobs:
  build-linux:
    name: Build Linux (x86_64)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Nim
        uses: jiro4989/setup-nim-action@v2
        with:
          nim-version: stable
          repo-token: ${{ github.token }}

      - name: Install Atlas via Nimble
        run: nimble install -y "https://github.com/nim-lang/atlas@#head"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libcurl4-openssl-dev sqlite3

      - name: Install Nim dependencies
        run: atlas install

      - name: Download SQLite Vector
        run: |
          curl -fL \
            "https://github.com/sqliteai/sqlite-vector/releases/download/${{ env.SQLITE_VECTOR_VERSION }}/vector-linux-x86_64-${{ env.SQLITE_VECTOR_VERSION }}.tar.gz" \
            -o vector-linux-x86_64.tar.gz
          mkdir -p sqlite-vector-download
          tar -xf vector-linux-x86_64.tar.gz -C sqlite-vector-download
          candidate="$(find sqlite-vector-download -type f -name 'vector.so' | head -n 1)"
          test -n "$candidate"
          cp "$candidate" vector.so

      - name: Build release binaries
        run: |
          nim c -d:release -o:cvstore src/cvstore.nim
          nim c -d:release -o:cvquery src/cvquery.nim

      - name: Strip executables
        run: strip cvstore cvquery

      - name: Create archive
        run: |
          mkdir -p dist
          cp cvstore dist/
          cp cvquery dist/
          cp config.json dist/
          cp LICENSE.md dist/
          cp README.md dist/
          cp vector.so dist/
          tar -czf chunkvec-linux-x86_64.tar.gz -C dist .

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: chunkvec-linux-x86_64-${{ env.VERSION }}
          path: chunkvec-linux-x86_64.tar.gz
          if-no-files-found: error

  build-macos:
    name: Build macOS (arm64)
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Nim
        uses: jiro4989/setup-nim-action@v2
        with:
          nim-version: stable
          repo-token: ${{ github.token }}

      - name: Install Atlas via Nimble
        run: nimble install -y "https://github.com/nim-lang/atlas@#head"

      - name: Install system dependencies
        run: brew install curl sqlite

      - name: Install Nim dependencies
        run: atlas install

      - name: Download SQLite Vector
        run: |
          curl -fL \
            "https://github.com/sqliteai/sqlite-vector/releases/download/${{ env.SQLITE_VECTOR_VERSION }}/vector-macos-${{ env.SQLITE_VECTOR_VERSION }}.tar.gz" \
            -o vector-macos.tar.gz
          mkdir -p sqlite-vector-download
          tar -xf vector-macos.tar.gz -C sqlite-vector-download
          candidate="$(find sqlite-vector-download -type f -name 'vector.dylib' | head -n 1)"
          test -n "$candidate"
          cp "$candidate" vector.dylib

      - name: Build release binaries
        run: |
          nim c -d:release -o:cvstore src/cvstore.nim
          nim c -d:release -o:cvquery src/cvquery.nim

      - name: Create archive
        run: |
          mkdir -p dist
          cp cvstore dist/
          cp cvquery dist/
          cp config.json dist/
          cp LICENSE.md dist/
          cp README.md dist/
          cp vector.dylib dist/
          tar -czf chunkvec-macos-arm64.tar.gz -C dist .

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: chunkvec-macos-arm64-${{ env.VERSION }}
          path: chunkvec-macos-arm64.tar.gz
          if-no-files-found: error

  build-windows:
    name: Build Windows (x86_64)
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Nim
        uses: jiro4989/setup-nim-action@v2
        with:
          nim-version: stable
          repo-token: ${{ github.token }}

      - name: Install Atlas via Nimble
        run: nimble install -y "https://github.com/nim-lang/atlas@#head"

      - name: Install system dependencies
        uses: johnwason/vcpkg-action@v7
        id: vcpkg
        with:
          pkgs: curl[http2,ssl,c-ares] sqlite3
          triplet: x64-windows-release
          token: ${{ github.token }}

      - name: Install Nim dependencies
        run: atlas install

      - name: Download SQLite Vector
        shell: pwsh
        run: |
          curl.exe -fL `
            "https://github.com/sqliteai/sqlite-vector/releases/download/${{ env.SQLITE_VECTOR_VERSION }}/vector-windows-x86_64-${{ env.SQLITE_VECTOR_VERSION }}.zip" `
            -o vector-windows-x86_64.zip
          Expand-Archive -Path vector-windows-x86_64.zip -DestinationPath sqlite-vector-download -Force
          $candidate = Get-ChildItem -Path sqlite-vector-download -Recurse -Filter vector.dll |
            Select-Object -First 1
          if ($null -eq $candidate) {
            throw "vector.dll not found in archive"
          }
          Copy-Item $candidate.FullName (Join-Path $pwd "vector.dll") -Force

      - name: Build release binaries
        shell: pwsh
        env:
          VCPKG_ROOT: ${{ github.workspace }}\vcpkg\installed\x64-windows-release
        run: |
          nim c -d:release -o:cvstore.exe src/cvstore.nim
          nim c -d:release -o:cvquery.exe src/cvquery.nim

      - name: Create archive
        shell: pwsh
        env:
          VCPKG_ROOT: ${{ github.workspace }}\vcpkg\installed\x64-windows-release
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Copy-Item cvstore.exe dist\
          Copy-Item cvquery.exe dist\
          Copy-Item config.json dist\
          Copy-Item LICENSE.md dist\
          Copy-Item README.md dist\
          Copy-Item vector.dll dist\
          Copy-Item "$env:VCPKG_ROOT\\bin\\*.dll" dist\ -ErrorAction Stop
          Compress-Archive -Path dist\* -DestinationPath chunkvec-windows-x86_64.zip -Force

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: chunkvec-windows-x86_64-${{ env.VERSION }}
          path: chunkvec-windows-x86_64.zip
          if-no-files-found: error

  create-release:
    name: Create Release
    needs:
      - build-linux
      - build-macos
      - build-windows
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download all artifacts
        uses: actions/download-artifact@v5
        with:
          path: artifacts

      - name: Gather release files
        run: |
          mkdir -p artifacts/release
          find artifacts -type f \( -name "*.zip" -o -name "*.tar.gz" \) -exec cp {} artifacts/release/ \;
          ls -la artifacts/release/

      - name: Create release notes
        run: |
          cat > release-notes.md << EOF
          ## Release ${{ env.VERSION }}

          Prebuilt binaries for:

          - Linux x86_64: chunkvec-linux-x86_64.tar.gz
          - macOS arm64: chunkvec-macos-arm64.tar.gz
          - Windows x86_64: chunkvec-windows-x86_64.zip

          Each archive includes the cvstore and cvquery executables,
          config.json, LICENSE.md, README.md, and the sqlite-vector runtime library beside the apps.
          The Windows archive also includes the required runtime DLLs from vcpkg.
          EOF

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.VERSION }}
          name: Release ${{ env.VERSION }}
          body_path: release-notes.md
          files: artifacts/release/*
          draft: true
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
